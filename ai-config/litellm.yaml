      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY

  # 未マッチ全部受ける wildcard
  - model_name: "*"
    litellm_params:
      model: nvidia_nim/moonshotai/kimi-k2-thinking
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
  - model_name: "*"
    litellm_params:
      model: nvidia_nim/deepseek-ai/deepseek-v4-pro
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 5
  allowed_fails: 1
  cooldown_time: 60
  retry_after: 1

litellm_settings:
  drop_params: true
  additional_drop_params:
    - output_config
    - thinking
    - anthropic_beta
    - cache_control
    - container
  set_verbose: false

general_settings:
  master_key: sk-litellm-local
