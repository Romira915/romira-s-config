set -g @thumbs-command 'tmux set-buffer -- {} && echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'tmux set-buffer -- {} && echo -n {} | pbcopy && open {}'

run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set-window-option -g mode-keys vi
set-option -g status-position top
set-option -g mouse on
set-option -g set-clipboard on
set-option -g automatic-rename-format '#{b:pane_current_path}:#{pane_current_command}'

set -g status-interval 1
set -g status-style "bg=default,fg=white"
set -g status-left-length 40
set -g status-right-length 100
set -g status-left "#[fg=cyan,bold]#S #[fg=white]| "
set -g status-right "#[fg=green,bold]%Y-%m-%d (%a) %H:%M:%S"
set -g window-status-current-format "#[fg=black,bg=cyan,bold] #I:#W#{?window_zoomed_flag, Z,} "
set -g window-status-format " #I:#W#{?window_zoomed_flag, Z,} "

set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#ff5555,bold"
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=red bold]● ACTIVE,#[fg=#666666]○} #[default]#{pane_current_command} "

set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=yellow,bold"

set -sg escape-time 0
set -g history-limit 50000
set -g default-command "fish -l"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on

bind r source-file ~/.tmux.conf \; display "reloaded"

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

bind -n M-k copy-mode -e \; send-keys -X -N 3 scroll-up
bind -T copy-mode-vi M-k send-keys -X -N 3 scroll-up
bind -T copy-mode-vi M-j send-keys -X -N 3 scroll-down

# Match OpenCode's Alt+U/J scroll shortcuts in Freebuff. Outside Freebuff,
# pass the keys through so other TUIs can handle their own bindings.
bind -n M-u if -F '#{==:#{pane_current_command},freebuff}' 'send-keys PageUp' 'send-keys M-u'
bind -n M-j if -F '#{==:#{pane_current_command},freebuff}' 'send-keys PageDown' 'send-keys M-j'

set-option -g default-terminal xterm-256color
set -ag terminal-overrides ",xterm-256color:RGB"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind Tab last-window

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind c new-window -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind m display-popup -E -w 60% -h 50% "~/.config/romira-s-config/tmux/scripts/join-pane.sh"
bind w display-popup -E -w 60% -h 50% "~/.config/romira-s-config/tmux/scripts/goto-window.sh"
bind b break-pane

bind C-s display-popup -E -w 60% -h 50% "tmux list-sessions -F '#{session_name}' | sk --reverse --header='switch session' | xargs -r tmux switch-client -t"
bind g display-popup -E -w 60% -h 50% "~/.config/romira-s-config/tmux/scripts/ghq-session.sh"

bind Enter display-popup -E -d "#{pane_current_path}" -w 80% -h 80% \
  "tmux attach -t scratch || tmux new -s scratch"

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux
