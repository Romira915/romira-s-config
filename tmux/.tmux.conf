run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set-window-option -g mode-keys vi
set-option -g status-position top
set-option -g mouse on
set-option -g set-clipboard on
set-option -g automatic-rename-format '#{b:pane_current_path}:#{pane_current_command}'

set -sg escape-time 0
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on

bind r source-file ~/.tmux.conf \; display "reloaded"

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

set-option -g default-terminal xterm-256color
set -ag terminal-overrides ",xterm-256color:RGB"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind c new-window -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind m display-popup -E -w 60% -h 50% "~/.config/romira-s-config/tmux/scripts/join-pane.sh"
bind w display-popup -E -w 60% -h 50% "~/.config/romira-s-config/tmux/scripts/goto-window.sh"
bind b break-pane

bind C-s display-popup -E -w 60% -h 50% "tmux list-sessions -F '#{session_name}' | sk --reverse --header='switch session' | xargs -r tmux switch-client -t"
bind g display-popup -E -w 60% -h 50% "~/.config/romira-s-config/tmux/scripts/ghq-session.sh"
